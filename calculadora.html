<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilo2.css">
    <title>Document</title>
</head>
<body>
    <main>
        <section id="contenedor">
            <form action="" method="" name="">
                <fieldset>
                    <legend>Calculadora</legend>
                    <input type="number" id="uno" placeholder="Primer número">
                    <input type="number" id="dos" placeholder="Segundo número">
                    <section>
                        <input type="button" id="suma" value="+">
                        <input type="button" id="resta" value="-">
                        <input type="button" id="multiplicacion" value="*">
                        <input type="button" id="division" value="/">
                    </section>
                    <label for="res">Resultado</label>
                    <input type="number" id="res" disabled>
                </fieldset>
            </form>
        </section>
    </main>
</body>
</html>
